name: Telegram Jokes Auto Post

on:
  schedule:
    - cron: "0 * * * *"     # har 1 ghante me
  workflow_dispatch:

permissions:
  contents: write

jobs:
  joke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Joke generate aur post karo
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          JOKES_CHANNEL_ID: ${{ secrets.JOKES_CHANNEL_ID }}
        run: python jokes.py

      - name: history save karo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jokes_history.json
          git commit -m "Update jokes history [skip ci]" || echo "Koi badlav nahi"
          git push || echo "Push skip"
